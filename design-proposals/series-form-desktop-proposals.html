<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Series Form Desktop Proposals</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: #0f1724;
      color: #e5ebf5;
      min-height: 100vh;
      padding: 1rem;
    }
    .top {
      width: min(1200px, 100%);
      margin: 0 auto 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      align-items: center;
      justify-content: space-between;
    }
    h1 {
      margin: 0;
      font-size: 1.08rem;
      letter-spacing: 0.02em;
      font-weight: 700;
    }
    .hint {
      color: #9ab0cf;
      font-size: 0.82rem;
    }
    .grid {
      width: min(1200px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 1rem;
    }
    .item {
      border: 1px solid #2a3c57;
      border-radius: 0.75rem;
      overflow: hidden;
      background: #121c2b;
      box-shadow: 0 20px 35px rgba(0, 0, 0, 0.35);
    }
    .bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.8rem;
      padding: 0.6rem 0.8rem;
      background: #1a2a40;
      border-bottom: 1px solid #2a3c57;
      font-size: 0.83rem;
    }
    .bar strong { font-size: 0.86rem; }
    .bar a {
      color: #a9d2ff;
      text-decoration: none;
      border: 1px solid #3b5676;
      border-radius: 999px;
      padding: 0.2rem 0.6rem;
      font-size: 0.75rem;
    }
    iframe {
      width: 100%;
      min-height: 720px;
      border: none;
      display: block;
      background: #0d1421;
    }
  </style>
</head>
<body>
  <div class="top">
    <h1>Series Form Desktop Redesign Proposals</h1>
    <div class="hint">Open each in new tab for full-size view.</div>
  </div>
  <section class="grid">
    <article class="item">
      <div class="bar">
        <strong>A · Editorial Split</strong>
        <a href="./6-series-form-editorial-split.html" target="_blank" rel="noreferrer">open</a>
      </div>
      <iframe src="./6-series-form-editorial-split.html" title="Proposal A"></iframe>
    </article>
    <article class="item">
      <div class="bar">
        <strong>B · Command Center</strong>
        <a href="./7-series-form-command-center.html" target="_blank" rel="noreferrer">open</a>
      </div>
      <iframe src="./7-series-form-command-center.html" title="Proposal B"></iframe>
    </article>
    <article class="item">
      <div class="bar">
        <strong>C · Atlas Glass</strong>
        <a href="./8-series-form-atlas-glass.html" target="_blank" rel="noreferrer">open</a>
      </div>
      <iframe src="./8-series-form-atlas-glass.html" title="Proposal C"></iframe>
    </article>
  </section>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Proposal 3 — Glass / gradient SaaS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --text: #0f172a;
      --muted: #64748b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Plus Jakarta Sans", system-ui, sans-serif;
      color: var(--text);
      min-height: 100vh;
      background:
        radial-gradient(ellipse 100% 80% at 10% 10%, rgba(167, 139, 250, 0.45), transparent 50%),
        radial-gradient(ellipse 80% 60% at 90% 20%, rgba(56, 189, 248, 0.35), transparent 45%),
        radial-gradient(ellipse 70% 50% at 50% 100%, rgba(251, 191, 36, 0.25), transparent 50%),
        linear-gradient(165deg, #e0e7ff 0%, #fae8ff 40%, #e0f2fe 100%);
    }
    .shell {
      max-width: 28rem;
      margin: 0 auto;
      padding: 1.25rem 1rem 3.5rem;
    }
    @media (min-width: 1024px) {
      .shell {
        max-width: 72rem;
        padding: 2rem 1.5rem 4rem;
      }
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 0.75rem;
    }
    header h1 {
      font-size: 1.375rem;
      font-weight: 700;
      margin: 0;
      letter-spacing: -0.02em;
    }
    .btn {
      padding: 0.6rem 1.1rem;
      font-size: 0.875rem;
      font-weight: 600;
      border: none;
      border-radius: 9999px;
      color: #fff;
      cursor: pointer;
      background: linear-gradient(135deg, #8b5cf6, #3b82f6);
      box-shadow: 0 8px 24px rgba(139, 92, 246, 0.35);
    }
    .glass {
      background: rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 1.25rem;
      box-shadow: 0 8px 32px rgba(15, 23, 42, 0.08);
    }
    .grid {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    @media (min-width: 1024px) {
      .grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 1.25rem;
      }
    }
    @media (min-width: 1280px) {
      .grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }
    .card {
      padding: 1.125rem;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.12);
    }
    .card-top { display: flex; gap: 1rem; }
    .cover {
      width: 4.5rem;
      height: 6.75rem;
      border-radius: 0.75rem;
      background: linear-gradient(145deg, #a78bfa, #6366f1);
      flex-shrink: 0;
      box-shadow: 0 4px 16px rgba(99, 102, 241, 0.35);
    }
    .card h2 {
      font-size: 1rem;
      font-weight: 700;
      margin: 0 0 0.25rem;
      letter-spacing: -0.02em;
    }
    .author { font-size: 0.8125rem; color: var(--muted); margin: 0; }
    .bar {
      margin-top: 1rem;
      height: 0.5rem;
      border-radius: 9999px;
      background: rgba(255, 255, 255, 0.5);
      overflow: hidden;
    }
    .bar > span {
      display: block;
      height: 100%;
      width: 62%;
      border-radius: 9999px;
      background: linear-gradient(90deg, #a78bfa, #22d3ee);
    }
    .bar-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.35rem;
    }
    .subgrid-title {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin: 1rem 0 0.75rem;
    }
    .book-tiles {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.5rem;
    }
    @media (min-width: 1280px) {
      .book-tiles { grid-template-columns: repeat(3, 1fr); }
    }
    .tile {
      background: rgba(255, 255, 255, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 0.75rem;
      padding: 0.5rem;
      text-align: center;
    }
    .tile .t-cover {
      aspect-ratio: 2/3;
      border-radius: 0.5rem;
      background: linear-gradient(180deg, #cbd5e1, #94a3b8);
      margin-bottom: 0.35rem;
    }
    .tile .t-title {
      font-size: 0.65rem;
      font-weight: 600;
      line-height: 1.3;
      margin: 0;
    }
    .tile .t-status {
      font-size: 0.6rem;
      color: var(--muted);
      margin: 0.2rem 0 0;
    }
    .label {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 0.5rem 1rem;
      font-size: 0.7rem;
      text-align: center;
      background: rgba(15, 23, 42, 0.75);
      backdrop-filter: blur(8px);
      color: #e2e8f0;
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <h1>Series Killer</h1>
      <button type="button" class="btn">+ Add series</button>
    </header>

    <div class="grid">
      <article class="glass card">
        <div class="card-top">
          <div class="cover" aria-hidden="true"></div>
          <div>
            <h2>The Amber Archives</h2>
            <p class="author">Elena Voss</p>
          </div>
        </div>
        <div class="bar-label"><span>Progress</span><span>5 / 8</span></div>
        <div class="bar"><span></span></div>
        <p class="subgrid-title">Books</p>
        <div class="book-tiles">
          <div class="tile"><div class="t-cover"></div><p class="t-title">The Index</p><p class="t-status">Done</p></div>
          <div class="tile"><div class="t-cover" style="background:linear-gradient(180deg,#bfdbfe,#60a5fa)"></div><p class="t-title">The Fold</p><p class="t-status">Reading</p></div>
          <div class="tile"><div class="t-cover" style="background:linear-gradient(180deg,#e9d5ff,#c084fc)"></div><p class="t-title">The Ledger</p><p class="t-status">TBR</p></div>
        </div>
      </article>

      <article class="glass card">
        <div class="card-top">
          <div class="cover" style="background:linear-gradient(145deg,#22d3ee,#0ea5e9)" aria-hidden="true"></div>
          <div>
            <h2>Coastal Mysteries</h2>
            <p class="author">M. Rowan</p>
          </div>
        </div>
        <div class="bar-label"><span>Progress</span><span>6 / 6</span></div>
        <div class="bar"><span style="width:100%;background:linear-gradient(90deg,#22d3ee,#34d399)"></span></div>
      </article>

      <article class="glass card">
        <div class="card-top">
          <div class="cover" style="background:linear-gradient(145deg,#fbbf24,#f97316)" aria-hidden="true"></div>
          <div>
            <h2>Short Stack</h2>
            <p class="author">Anthology</p>
          </div>
        </div>
        <div class="bar-label"><span>Progress</span><span>1 / 4</span></div>
        <div class="bar"><span style="width:25%"></span></div>
      </article>
    </div>
  </div>
  <p class="label">Proposal 3 — Glass / gradient · 1 col mobile · 2 col lg · 3 col xl + book tile grid</p>
</body>
</html>
